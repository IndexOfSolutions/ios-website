name: Deploy Next.js to Azure App Service

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          # Build-time variables (NEXT_PUBLIC_* must be here)
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          # Add any other NEXT_PUBLIC_ vars here

      - name: Prepare deployment package
        run: |
          # Copy standalone output (includes its own trimmed node_modules)
          cp -r .next/standalone/. ./deploy

          # Must copy these manually - Next.js excludes them from standalone
          cp -r .next/static ./deploy/.next/static
          cp -r public ./deploy/public

          # Prevent Oryx from rebuilding on the server
          echo '[config]' > ./deploy/.deployment
          echo 'SCM_DO_BUILD_DURING_DEPLOYMENT=false' >> ./deploy/.deployment

          # Startup script - more reliable than Azure portal startup command
          cat > ./deploy/startup.sh << 'EOF'
          #!/bin/bash
          export PORT=8080
          export NODE_ENV=production
          cd /home/site/wwwroot
          node server.js
          EOF
          chmod +x ./deploy/startup.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: ./deploy
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: ./deploy

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: "IOSWebsite"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy
