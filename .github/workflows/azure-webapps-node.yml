name: Build and Deploy to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or 22

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Prepare Standalone for Azure
        run: |
          # Copy static and public files into the standalone folder
          mkdir -p .next/standalone/public
          cp -r public/* .next/standalone/public/ || true
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/* .next/standalone/.next/static/ || true
          # Verify the copy
          echo "Contents of .next/standalone/public:"
          ls -la .next/standalone/public/ || echo "No public folder"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'IOSWebsite'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .next/standalone