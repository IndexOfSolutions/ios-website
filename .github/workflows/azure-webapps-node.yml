name: Deploy Next.js to Azure App Service

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Prepare standalone deployment package
        run: |
          # Copy contents of standalone (includes its own node_modules)
          cp -r .next/standalone/. ./deploy

          # These two MUST be copied manually - Next.js excludes them from standalone intentionally
          cp -r .next/static ./deploy/.next/static
          cp -r public ./deploy/public

      # DO NOT run npm install here - standalone already has node_modules

      - name: Zip deployment package
        run: |
          cd deploy
          zip -r ../deploy.zip .

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'IOSWebsite'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ../deploy.zip