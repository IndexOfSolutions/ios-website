name: Build and deploy Next.js to Azure Web App - IOSWebsite

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # We only copy the specific files needed to RUN the app in production.
      - name: Prepare Deployment Artifact
        run: |
          mkdir deploy
          cp -r .next deploy/
          cp -r public deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp next.config.mjs deploy/ || cp next.config.js deploy/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F044459DA0E64274B4148D4F8F3E9999 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F24D0C2008994AE983F496B82A4F07EA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F4A22AFE298844C0863DCD9A7AA808F8 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'IOSWebsite'
          slot-name: 'Production'
          package: .
          clean: true  # <--- THIS deletes the old source files currently in your wwwroot