name: Build and deploy Next.js to Azure App Service - IOSWebsite

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci  # use ci not install — faster, deterministic, respects lockfile

      - name: Build Next.js
        env:
          # NEXT_PUBLIC_* vars MUST be here — they're baked into the client bundle at build time
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          # Server-only vars (not NEXT_PUBLIC) also needed if used during build (e.g. generateStaticParams)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY}}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_TO: ${{ secrets.CONTACT_TO }}
        run: |
          npm install
          npm run build
          mv ./build/static ./build/standalone/build
          mv ./public ./build/standalone

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !node_modules  # exclude node_modules — Azure installs them
            !.git

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F044459DA0E64274B4148D4F8F3E9999 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F24D0C2008994AE983F496B82A4F07EA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F4A22AFE298844C0863DCD9A7AA808F8 }}
          # ✅ NO env vars here — this action only does auth

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'IOSWebsite'
          slot-name: 'Production'
          package: .