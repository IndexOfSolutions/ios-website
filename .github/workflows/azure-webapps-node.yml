name: Build and deploy Node.js app to Azure Web App - IOSWebsite

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      # 1. Force clean any local environment artifacts
      - name: Clean install and build
        run: |
          rm -rf node_modules
          npm ci
          npm run build --if-present

      # 2. Only upload what is necessary for production
      # Removing 'path: .' and replacing with specific folders prevents uploading .git, etc.
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !node_modules
            !.git
            !.github

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F044459DA0E64274B4148D4F8F3E9999 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F24D0C2008994AE983F496B82A4F07EA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F4A22AFE298844C0863DCD9A7AA808F8 }}

      # 3. Use Azure CLI to clear the remote target directory if needed
      # This ensures 'wwwroot' is empty before the new zip is deployed.
      - name: 'Empty target directory'
        run: |
          az webapp deployment source config-zip --clear --name 'IOSWebsite' --resource-group '<Your-Resource-Group-Name>' --src /dev/null || true

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'IOSWebsite'
          slot-name: 'Production'
          # Deploying as a package (.zip) is the best way to ensure a "clean" filesystem
          package: .
          clean: true