name: Deploy Next.js to Azure App Service

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci          # ← just this, no --omit=dev flag

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Prune dev dependencies after build
        run: npm prune --omit=dev

      - name: Zip deployment package
        run: |
          zip -r ${{ github.workspace }}/deploy.zip . \
            --exclude "*.git*" \
            --exclude "*/.github/*" \
            --exclude "*.next/cache*"

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'IOSWebsite'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/deploy.zip