name: Build and Deploy to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or 22

      - name: Install & Build
        run: |
          npm ci
          npm run build
          # Verify node_modules exists
          if [ ! -d ".next/standalone/node_modules" ]; then
            echo "ERROR: node_modules not found in .next/standalone"
            exit 1
          fi
          echo "✓ Build successful, node_modules found"

      - name: Prepare Standalone for Azure
        run: |
          # Copy public files to standalone
          mkdir -p .next/standalone/public
          cp -r public/* .next/standalone/public/ || true
          
          # Copy .next/static to standalone
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/* .next/standalone/.next/static/ || true
          
          # Verify structure
          echo "Checking .next/standalone structure:"
          ls -la .next/standalone/ | head -20
          echo "---"
          if [ -d ".next/standalone/node_modules" ]; then
            echo "✓ node_modules exists"
            echo "  Size: $(du -sh .next/standalone/node_modules)"
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'IOSWebsite'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .next/standalone