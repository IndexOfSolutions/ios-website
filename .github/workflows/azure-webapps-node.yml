# .github/workflows/deploy.yml
name: Deploy Next.js to Azure App Service

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # This is important — package ONLY what's needed
      - name: Prepare standalone deployment
        run: |
          mkdir deploy
          cp -r .next/standalone/. deploy/
          cp -r public deploy/
          cp -r .next/static deploy/.next/static

      - name: Install production deps in deploy folder
        run: |
          cd deploy
          npm ci --omit=dev

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'IOSWebsite'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./deploy